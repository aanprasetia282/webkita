<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web kita💕</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 1rem 0;
            transition: all 0.3s ease;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            position: relative;
            transition: color 0.3s ease;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: #ff6b9d;
        }

        /* BANNER/Hero Section */
        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .hero-slides {
            position: absolute;
            top: 0;
            left: 0;
            width: 300%;
            height: 100%;
            animation: slide 15s infinite ease-in-out;
        }

        .hero-slide {
            width: 33.333%;
            height: 100%;
            float: left;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .hero-slide:nth-child(1) { background-image: url(3.jpeg); }
        .hero-slide:nth-child(2) { background-image: url(4.jpeg); }
        .hero-slide:nth-child(3) { background-image: url(5.jpeg); }

        @keyframes slide {
            0%, 33.33% { transform: translateX(0); }
            33.34%, 66.66% { transform: translateX(-33.333%); }
            66.67%, 100% { transform: translateX(-66.666%); }
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            max-width: 800px;
            padding: 0 2rem;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 20px rgba(255, 107, 157, 0.5)); }
            to { filter: drop-shadow(0 0 30px rgba(255, 107, 157, 0.8)); }
        }

        .hero p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }

        /* SECTION */
        .section {
            padding: 100px 0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 4rem;
            background: linear-gradient(45deg, #ff6b9d, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* GALERI */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
        }

        .gallery-item {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            height: 350px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .gallery-item:hover {
            transform: translateY(-20px) scale(1.02);
            box-shadow: 0 30px 60px rgba(255, 107, 157, 0.3);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: white;
            padding: 2rem;
            transform: translateY(100%);
            transition: transform 0.4s ease;
        }

        .gallery-item:hover .gallery-overlay {
            transform: translateY(0);
        }

        /* CONTACT */
        .contact-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 4rem;
            text-align: center;
            border: 1px solid rgba(255, 107, 157, 0.2);
        }

        .contact-item {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .contact-item:hover {
            transform: translateX(10px);
        }

        .contact-item i {
            font-size: 1.8rem;
            color: #ff6b9d;
            width: 40px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            position: relative;
            animation: modalZoom 0.4s ease;
        }

        @keyframes modalZoom {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: -50px;
            right: 0;
            font-size: 2.5rem;
            color: #ff6b9d;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .modal-close:hover {
            transform: scale(1.2);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }

            .hero h1 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1.2rem;
            }

            .section-title {
                font-size: 2rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }

        /* SCROLL ANIMATIONS */
        .fade-in {
            opacity: 0;
            transform: translateY(50px);
            transition: all 0.8s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* HATI ANIMASI */
        .floating-heart {
            position: fixed;
            color: #ff6b9d;
            font-size: 20px;
            pointer-events: none;
            z-index: 100;
            animation: float 6s linear forwards;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-heart">Web Kita</i> 
            </div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#gallery">Galeri</a></li>
                <li><a href="#contact">Kontak</a></li>
            </ul>
        </div>
    </nav>

    <!-- HERO/BANNER -->
    <section id="home" class="hero">
        <div class="hero-slides">
            <div class="hero-slide"></div>
            <div class="hero-slide"></div>
            <div class="hero-slide"></div>
        </div>
        <div class="hero-content">
            <h1>Selamat Datang di Website Kita 💕</h1>
            <p>hallooo...</p>
        </div>
    </section>

    <!-- GALERI -->
    <section id="gallery" class="section">
        <div class="container">
            <h2 class="section-title fade-in">Galeri Foto</h2>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Galeri akan dimuat via JS -->
            </div>
        </div>
    </section>

    <!-- CONTACT -->
    <section id="contact" class="section">
        <div class="container">
            <h2 class="section-title fade-in">Hubungi Kita</h2>
            <div class="contact-container fade-in">
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <span>aanzahra@gmail.com</span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-phone"></i>
                    <span>+62 813-2978-5838</span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-heart"></i>
                    <span>💕</span>
                </div>
            </div>
        </div>
    </section>

    <!-- MODAL -->
    <div class="modal" id="imageModal">
        <span class="modal-close" id="modalClose">&times;</span>
        <img class="modal-content" id="modalImage" src="">
    </div>

    <script>
        // DATA GALERI - GANTI DENGAN FOTO KAMU!
        const galleryData = [
            { src: '2.jpeg', title: 'Kencan Pertama', desc: 'Momen pertama kita bertemu' },
            { src: '3.jpeg', title: 'Sunset Romantis', desc: 'Menikmati senja berdua' },
            { src: '1.jpeg', title: 'Pelukan Hangat', desc: 'Pelukanmu adalah rumahku' },
            { src: '4.jpeg', title: 'Tertawa Bersama', desc: 'Tawamu adalah melodiku' },
            { src: '5.jpeg', title: 'Selfie Couple', desc: 'Kita paling cocok!' },
            { src: '6.jpeg', title: 'Momen Manis', desc: 'Setiap detik bersamamu manis' },
            { src: '7.jpeg', title: 'Foto Estetik', desc: 'Keren banget kita berdua' },
            { src: '8.jpeg', title: 'Cuddle Time', desc: 'Peluk erat terus ya' },
            { src: '9.jpeg', title: 'Cuddle Time', desc: 'Peluk erat terus ya' },
            { src: '10.jpeg', title: 'Cuddle Time', desc: 'Peluk erat terus ya' },
            { src: '11.jpeg', title: 'Cuddle Time', desc: 'Peluk erat terus ya' },
            { src: '12.jpeg', title: 'Cuddle Time', desc: 'Peluk erat terus ya' }
        ];

        // Render Gallery
        const galleryGrid = document.getElementById('galleryGrid');
        galleryData.forEach((item, index) => {
            const galleryItem = document.createElement('div');
            galleryItem.className = 'gallery-item fade-in';
            galleryItem.innerHTML = `
                <img src="${item.src}" alt="${item.title}" loading="lazy">
                <div class="gallery-overlay">
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                </div>
            `;
            galleryItem.onclick = () => openModal(item.src);
            galleryGrid.appendChild(galleryItem);
        });

        // Modal
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const modalClose = document.getElementById('modalClose');

        function openModal(src) {
            modal.style.display = 'flex';
            modalImg.src = src;
            document.body.style.overflow = 'hidden';
        }

        modalClose.onclick = closeModal;
        modal.onclick = (e) => {
            if (e.target === modal) closeModal();
        };

        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 100) {
                navbar.style.background = 'rgba(10, 10, 10, 0.98)';
                navbar.style.padding = '0.5rem 0';
            } else {
                navbar.style.background = 'rgba(10, 10, 10, 0.95)';
                navbar.style.padding = '1rem 0';
            }
        });

        // Smooth scroll untuk navbar links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                target.scrollIntoView({ behavior: 'smooth' });
            });
        });

        // Scroll animations
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.fade-in').forEach(el => {
            observer.observe(el);
        });

        // Floating hearts animation
        function createHeart() {
            const heart = document.createElement('i');
            heart.className = 'fas fa-heart floating-heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
            document.body.appendChild(heart);

            setTimeout(() => heart.remove(), 6000);
        }

        setInterval(createHeart, 2000);

        // Particles background
        function createParticle() {
            const particle = document.createElement('div');
            particle.style.cssText = `
                position: fixed;
                top: 100vh;
                left: ${Math.random() * 100}vw;
                width: ${Math.random() * 3 + 1}px;
                height: ${Math.random() * 3 + 1}px;
                background: rgba(255, 107, 157, 0.6);
                border-radius: 50%;
                pointer-events: none;
                z-index: 50;
                animation: particleFloat 8s linear infinite;
            `;
            document.body.appendChild(particle);

            setTimeout(() => particle.remove(), 8000);
        }

        const particleStyles = `
            @keyframes particleFloat {
                to {
                    transform: translateY(-100vh) rotate(360deg);
                    opacity: 0;
                }
            }
        `;
        const style = document.createElement('style');
        style.textContent = particleStyles;
        document.head.appendChild(style);

        setInterval(createParticle, 500);
    </script>
</body>
</html>
